<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="content">
        <div class="player-card" id="player-x">
            <div class="player-symbol player-x-symbol">X</div>
            <input type="text" class="player-name" value="Player 1">
            <button class="player-type-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>account</title><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z" /></svg>
                <p>Human</p>
            </button>
            <div class="player-score">
                <p class="score-text">Score</p>
                <p class="score-num">0</p>
            </div>
        </div>
        <div id="gameboard">
            <div class="grid" data-row="0" data-col="0"></div>
            <div class="grid" data-row="0" data-col="1"></div>
            <div class="grid" data-row="0" data-col="2"></div>
            <div class="grid" data-row="1" data-col="0"></div>
            <div class="grid" data-row="1" data-col="1"></div>
            <div class="grid" data-row="1" data-col="2"></div>
            <div class="grid" data-row="2" data-col="0"></div>
            <div class="grid" data-row="2" data-col="1"></div>
            <div class="grid" data-row="2" data-col="2"></div>
        </div>
        <div class="player-card" id="player-o">
            <div class="player-symbol player-o-symbol">O</div>
            <input type="text" class="player-name" value="Player 2">
            <button class="player-type-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>robot</title><path d="M12,2A2,2 0 0,1 14,4C14,4.74 13.6,5.39 13,5.73V7H14A7,7 0 0,1 21,14H22A1,1 0 0,1 23,15V18A1,1 0 0,1 22,19H21V20A2,2 0 0,1 19,22H5A2,2 0 0,1 3,20V19H2A1,1 0 0,1 1,18V15A1,1 0 0,1 2,14H3A7,7 0 0,1 10,7H11V5.73C10.4,5.39 10,4.74 10,4A2,2 0 0,1 12,2M7.5,13A2.5,2.5 0 0,0 5,15.5A2.5,2.5 0 0,0 7.5,18A2.5,2.5 0 0,0 10,15.5A2.5,2.5 0 0,0 7.5,13M16.5,13A2.5,2.5 0 0,0 14,15.5A2.5,2.5 0 0,0 16.5,18A2.5,2.5 0 0,0 19,15.5A2.5,2.5 0 0,0 16.5,13Z" /></svg>
                <p>Robot</p>
            </button>
            <div class="player-score">
                <p class="score-text">Score</p>
                <p class="score-num">0</p>
            </div>
        </div>
    </div>

    <dialog id="game-over-modal">
        <div class="modal-top">
            <p id="winner-text"></p>
            <p id="winner-symbol"></p>
        </div>
        <button id="play-again-btn">Play Again</button>
    </dialog>
</body>
</html>
